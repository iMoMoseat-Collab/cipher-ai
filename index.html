<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CIPHER"/>
<meta name="theme-color" content="#080c08"/>
<title>CIPHER</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080c08'/><polygon points='50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5' fill='none' stroke='%2300ff41' stroke-width='4'/><text x='50' y='58' text-anchor='middle' fill='%2300ff41' font-size='28' font-family='monospace' font-weight='bold'>CI</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c08;--bg2:#0d120d;--bg3:#111811;
  --g1:#00ff41;--g2:#00cc33;--g3:#008f23;
  --dim:#003d10;--txt3:#006b1c;
  --brd:#003d10;--brd2:#006b1c;
  --red:#ff3333;
  --fs:14px;
}
/* Themes */
body.theme-amber{--g1:#ffb300;--g2:#ff8f00;--g3:#e65100;--dim:#3e2000;--txt3:#5d3a00;--brd:#3e2000;--brd2:#5d3a00;}
body.theme-cyan{--g1:#00e5ff;--g2:#00b8d4;--g3:#0097a7;--dim:#002f3e;--txt3:#004d5e;--brd:#002f3e;--brd2:#004d5e;}
body.theme-red{--g1:#ff1744;--g2:#d50000;--g3:#b71c1c;--dim:#3e0000;--txt3:#5d0000;--brd:#3e0000;--brd2:#5d0000;}
body.theme-purple{--g1:#e040fb;--g2:#aa00ff;--g3:#7b1fa2;--dim:#2e003e;--txt3:#4a005e;--brd:#2e003e;--brd2:#4a005e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available;background:var(--bg);overflow:hidden}
body{
  height:100dvh;display:flex;flex-direction:column;
  font-family:'Share Tech Mono','Noto Sans Thai',monospace;
  color:var(--g1);background:var(--bg);
  overflow:hidden;position:fixed;inset:0;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#001a0666,transparent 70%);}

/* Scan line */
#scan{position:fixed;left:0;width:100%;height:2px;z-index:50;pointer-events:none;
  background:linear-gradient(90deg,transparent,#00ff4133,#00ff4166,#00ff4133,transparent);
  animation:scan-move 4s linear infinite;opacity:.5;}
@keyframes scan-move{0%{top:0}100%{top:100vh}}

/* ── HEADER ── */
#header{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  background:var(--bg2);border-bottom:1px solid var(--brd2);
  position:relative;z-index:20;flex-shrink:0;
  box-shadow:0 0 20px #00ff4122;min-height:0;
}
#orb{width:36px;height:36px;border-radius:4px;flex-shrink:0;cursor:pointer;
  background:var(--bg3);border:1px solid var(--g2);
  box-shadow:0 0 12px #00ff4144,inset 0 0 8px #00ff4111;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  animation:neon-pulse 2s ease-in-out infinite;transition:all .15s;}
#orb:active{transform:scale(.9)}
@keyframes neon-pulse{0%,100%{box-shadow:0 0 12px #00ff4144,inset 0 0 8px #00ff4111}50%{box-shadow:0 0 28px #00ff4188,inset 0 0 14px #00ff4122}}
#name-block{flex:1;min-width:0}
#ai-name{font-size:14px;font-weight:700;letter-spacing:3px;color:var(--g1);text-shadow:0 0 10px var(--g1);line-height:1;
  animation:glitch1 4s infinite;}
@keyframes glitch1{0%,90%,100%{transform:translate(0)}91%{transform:translate(-2px,1px)}92%{transform:translate(2px,-1px)}93%{transform:translate(0)}96%{transform:translate(-1px,2px)}97%{transform:translate(1px,-1px)}98%{transform:translate(0)}}
#ai-sub{font-size:6.5px;letter-spacing:2px;color:var(--txt3);margin-top:2px}
#stat-row{display:flex;align-items:center;gap:6px;margin-top:3px}
#spip{width:6px;height:6px;border-radius:50%;background:var(--g1);box-shadow:0 0 6px var(--g1);animation:pip 2s ease-in-out infinite;flex-shrink:0}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.2}}
#stat-txt{font-size:8px;letter-spacing:1px;color:var(--txt3)}
#hbtns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hb{width:32px;height:32px;border-radius:4px;font-size:13px;
  border:1px solid var(--brd2);background:var(--bg3);color:var(--g2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 0 8px #00ff4111;}
.hb:active{transform:scale(.88);background:var(--bg)}
.hb.off{opacity:.3}
.hb.red{border-color:#ff333355;color:var(--red)}

/* ── MESSAGES ── */
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 12px 6px;
  display:flex;flex-direction:column;gap:10px;position:relative;z-index:5;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0;}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.msg{animation:msg-in .2s ease both;display:flex;gap:8px;align-items:flex-start}
.msg.usr{flex-direction:row-reverse}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.av{width:28px;height:28px;border-radius:3px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;letter-spacing:1px;border:1px solid var(--brd2);}
.av.ai-av{background:var(--bg);color:var(--g1);box-shadow:0 0 8px #00ff4122}
.av.usr-av{background:var(--bg3);color:var(--txt3)}
.mb{max-width:85%;display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.msg.usr .mb{align-items:flex-end}
.ml{font-size:7px;letter-spacing:1.5px;color:var(--txt3);padding:0 3px}
.bub{padding:9px 12px;font-size:var(--fs);line-height:1.65;
  word-break:break-word;white-space:pre-wrap;border-radius:2px;border-left:2px solid;
  font-family:'Noto Sans Thai','Share Tech Mono',monospace;
  -webkit-user-select:text;user-select:text;cursor:pointer;position:relative;}
.bub:active{opacity:.8}
.copy-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--g2);border-radius:4px;
  padding:6px 16px;font-size:9px;letter-spacing:2px;color:var(--g1);
  z-index:500;pointer-events:none;animation:msg-in .2s ease;font-family:'Share Tech Mono',monospace;}
.bub.ai-b{background:var(--bg2);color:var(--g1);border-color:var(--g2);
  box-shadow:0 0 12px #00ff4111;text-shadow:0 0 8px #00ff4122;}
.bub.usr-b{background:var(--bg3);color:var(--g3);border-color:var(--dim);text-align:right;}
.msg-time{font-size:7px;color:var(--txt3);letter-spacing:1px;padding:0 4px;font-family:'Share Tech Mono',monospace;}
.rbtn{padding:2px 8px;border-radius:2px;font-size:7px;letter-spacing:1px;
  border:1px solid var(--brd);background:transparent;color:var(--txt3);
  cursor:pointer;font-family:'Share Tech Mono',monospace;transition:all .15s;}
.rbtn:active{background:var(--bg);color:var(--g1)}

/* ── LOADING ── */
#loading{display:none;gap:8px;align-items:flex-start}
#ld-av{width:28px;height:28px;border-radius:3px;flex-shrink:0;
  background:var(--bg);border:1px solid var(--brd2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--g1);animation:neon-pulse 1s ease-in-out infinite}
#ld-bub{padding:9px 12px;border-radius:2px;border-left:2px solid var(--g2);background:var(--bg2)}
#ld-lbl{font-size:7px;letter-spacing:2px;color:var(--txt3);margin-bottom:6px}
.wave{display:flex;align-items:center;gap:3px}
.wave span{width:3px;border-radius:1px;background:var(--g2);display:block;animation:wv .8s ease-in-out infinite}
@keyframes wv{0%,100%{transform:scaleY(.3);opacity:.3}50%{transform:scaleY(1.5);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#cursor{display:inline-block;width:8px;height:13px;background:var(--g1);
  vertical-align:middle;animation:blink .8s step-end infinite;margin-left:2px}

/* ── INPUT ── */
#inp-wrap{
  padding:8px 12px max(10px,env(safe-area-inset-bottom));
  background:var(--bg2);border-top:1px solid var(--brd2);
  position:relative;z-index:10;flex-shrink:0;min-height:0;
}
#inp-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--g2),transparent);}
#inp-box{display:flex;gap:6px;align-items:flex-end;
  background:var(--bg3);border:1px solid var(--brd2);border-radius:3px;
  padding:7px 7px 7px 11px;transition:border-color .2s,box-shadow .2s;}
#inp-box:focus-within{border-color:var(--g1);box-shadow:0 0 16px #00ff4133;}
#inp-box.mic-on{border-color:var(--red);box-shadow:0 0 16px #ff333333}
#prompt-sym{color:var(--g1);font-size:14px;padding-bottom:1px;flex-shrink:0;text-shadow:0 0 8px var(--g1)}
#msg-inp{flex:1;background:transparent;border:none;outline:none;
  color:var(--g1);font-size:16px;font-family:'Noto Sans Thai','Share Tech Mono',monospace;
  line-height:1.5;min-height:24px;max-height:120px;resize:none;caret-color:var(--g1);}
#msg-inp::placeholder{color:var(--dim)}
.ab{width:36px;height:36px;border-radius:3px;font-size:15px;flex-shrink:0;
  border:1px solid var(--brd2);background:var(--bg);color:var(--txt3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ab:active{transform:scale(.88);background:var(--bg3)}
.ab.mic-on{border-color:var(--red);color:var(--red)}
#send-ab{background:var(--bg);border-color:var(--g2);color:var(--g1);
  box-shadow:0 0 10px #00ff4133;font-size:13px}
#send-ab.dim{background:var(--bg);border-color:var(--brd);color:var(--dim);box-shadow:none}
#footer-txt{text-align:center;font-size:6px;color:var(--dim);margin-top:6px;letter-spacing:1px}

/* Status bar */
#status-bar{display:flex;align-items:center;justify-content:center;gap:12px;
  padding:3px 12px;background:var(--bg);border-bottom:1px solid var(--brd);flex-shrink:0;}
.svc{display:flex;align-items:center;gap:4px;font-size:7px;letter-spacing:1px;color:var(--txt3)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--g1);box-shadow:0 0 5px var(--g1)}
.sdot.off{background:#333;box-shadow:none}

/* Scroll to top */
#scroll-top{position:fixed;bottom:90px;right:14px;z-index:50;
  width:32px;height:32px;border-radius:4px;
  background:var(--bg2);border:1px solid var(--brd2);color:var(--g2);
  font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 0 10px #00ff4122;transition:all .2s;}
#scroll-top:active{transform:scale(.88)}

/* Theme picker */
#theme-panel{position:fixed;top:50px;right:10px;z-index:100;
  background:var(--bg2);border:1px solid var(--brd2);border-radius:4px;
  padding:10px;display:none;flex-direction:column;gap:8px;
  box-shadow:0 0 20px #00ff4122;min-width:140px;}
#theme-panel.show{display:flex}
.theme-btn{padding:6px 10px;border-radius:3px;border:1px solid var(--brd2);
  background:var(--bg3);color:var(--g2);font-size:9px;letter-spacing:2px;
  cursor:pointer;font-family:'Share Tech Mono',monospace;text-align:left;transition:all .15s;}
.theme-btn:active{opacity:.7}

/* Font size control */
#font-panel{position:fixed;top:50px;right:10px;z-index:100;
  background:var(--bg2);border:1px solid var(--brd2);border-radius:4px;
  padding:10px;display:none;flex-direction:column;gap:8px;
  box-shadow:0 0 20px #00ff4122;min-width:140px;}
#font-panel.show{display:flex}

/* ── SETUP ── */
#api-scr{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;gap:16px;
}
#setup-ascii">[ CIPHER SYSTEM v2.0 ]\n─────────────────────</div>
  <div id="setup-name">CIPHER</div>
  <div id="setup-sub">COGNITIVE INTELLIGENCE PERSONAL HUB</div>
  <div id="setup-desc">ใส่ API Keys เพื่อเปิดใช้งานค่ะ<br/>ใส่ครั้งเดียวจำตลอดนะคะ</div>
  <div style="width:100%;max-width:340px;font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px">GROQ API KEY (console.groq.com)</div>
  <input id="api-inp" type="password" placeholder="gsk_···" style="width:100%;max-width:340px;padding:13px 16px;background:var(--bg2);border:1px solid var(--brd2);border-radius:3px;color:var(--g1);font-size:14px;font-family:'Share Tech Mono',monospace;outline:none;letter-spacing:1px;margin-bottom:8px"/>
  <div style="width:100%;max-width:340px;font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px">TAVILY API KEY (app.tavily.com) — ค้นหาเว็บ</div>
  <input id="tavily-inp" type="password" placeholder="tvly-···" style="width:100%;max-width:340px;padding:13px 16px;background:var(--bg2);border:1px solid var(--brd2);border-radius:3px;color:var(--g1);font-size:14px;font-family:'Share Tech Mono',monospace;outline:none;letter-spacing:1px"/>
  <button id="start-btn" onclick="saveKey()">[ INITIALIZE CIPHER ]</button>
  <div id="setup-note">GROQ: llama-3.3-70b · TAVILY: web search · FREE</div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100dvh;min-height:-webkit-fill-available">
  <div id="header">
    <div id="orb" onclick="replayLast()">⬡</div>
    <div id="name-block">
      <div id="ai-name">CIPHER</div>
      <div id="ai-sub">COGNITIVE INTELLIGENCE · GROQ 70B</div>
      <div id="stat-row"><div id="spip"></div><span id="stat-txt">ONLINE</span></div>
    </div>
    <div id="hbtns">
      <button class="hb red" id="stop-btn" style="display:none" onclick="stopSpeak()">⏹</button>
      <button class="hb" id="vbtn" onclick="toggleVoice()">🔊</button>
      <button class="hb" onclick="clearKey()" style="font-size:9px;letter-spacing:0">KEY</button>
    </div>
  </div>

  <div id="status-bar">
    <div class="svc"><div class="sdot" id="groq-dot"></div><span>GROQ</span></div>
    <div class="svc"><div class="sdot off" id="tavily-dot"></div><span>TAVILY</span></div>
    <div class="svc" style="cursor:pointer" onclick="toggleTheme()">🎨 <span>THEME</span></div>
    <div class="svc" style="cursor:pointer" onclick="changeFontSize()">📏 <span id="fs-label">14px</span></div>
    <div class="svc" style="cursor:pointer;color:var(--red)" onclick="clearChat()">🗑️ <span>CLEAR</span></div>
  </div>

  <div id="msgs">
    <div id="loading" style="display:none;flex-direction:row">
      <div id="ld-av">CI</div>
      <div id="ld-bub">
        <div id="ld-lbl">PROCESSING<span id="cursor"></span></div>
        <div class="wave" id="ld-wave"></div>
      </div>
    </div>
  </div>

  <div id="inp-wrap">
    <div id="inp-box">
      <span id="prompt-sym">&gt;_</span>
      <textarea id="msg-inp" rows="1" placeholder="พิมพ์หรือพูดกับ CIPHER..."></textarea>
      <button class="ab" id="mic-btn" onclick="toggleListen()" style="display:none">🎤</button>
      <button class="ab dim" id="send-ab" onclick="sendMsg()">▶</button>
    </div>
    <div id="footer-txt">CIPHER · GROQ FREE · <span id="ft-voice">VOICE ON</span></div>
  </div>
</div>

<div id="tap-splash" style="display:none" onclick="onTap()">
  <div id="tap-icon">⬡</div>
  <div id="tap-title">[ TAP TO START ]</div>
  <div id="tap-sub">แตะที่ไหนก็ได้เพื่อเริ่ม</div>
</div>

<button id="scroll-top" onclick="scrollToTop()">▲</button>

<div id="theme-panel">
  <div style="font-size:8px;letter-spacing:2px;color:var(--txt3);margin-bottom:4px">THEME</div>
  <button class="theme-btn" onclick="setTheme('green')">🟢 GREEN</button>
  <button class="theme-btn" onclick="setTheme('amber')">🟡 AMBER</button>
  <button class="theme-btn" onclick="setTheme('cyan')">🔵 CYAN</button>
  <button class="theme-btn" onclick="setTheme('red')">🔴 RED</button>
  <button class="theme-btn" onclick="setTheme('purple')">🟣 PURPLE</button>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────
const GROQ_URL   = 'https://api.groq.com/openai/v1/chat/completions';
const TAVILY_URL = 'https://api.tavily.com/search';
const WORKER_URL = 'https://cipher-proxy.akkarapon-tantrakul.workers.dev';
const SYSTEM = `คุณคือไซเฟอร์ ผู้ช่วย AI ของคุณเอ็ม
ตอบภาษาไทยอย่างสุภาพ เรียบร้อย และเป็นทางการเสมอ ลงท้ายด้วยครับ/หากมีข้อสงสัยเพิ่มเติมสอบถามได้ครับ ยกเว้นถ้าถามเป็นอังกฤษให้ตอบอังกฤษ
ตอบกระชับ ตรงประเด็น เป็นข้อมูลจริง ไม่พูดเกินจำเป็น
ถ้ามีข้อมูลจากการค้นหาเว็บ ให้ใช้ข้อมูลนั้นเท่านั้น ห้ามใช้ความรู้เดิม
ถ้าไม่รู้ให้บอกตรงๆ อย่างสุภาพและเป็นทางการ ห้ามคาดเดาข้อมูล เรียกผู้ใช้ว่าคุณเอ็มทุกครั้ง`;

// ── State ─────────────────────────────────────────────────────────
let GROQ_KEY   = localStorage.getItem('cipher_groq')   || '';
let TAVILY_KEY = localStorage.getItem('cipher_tavily') || '';
let history = [];
let speaking = false, listening = false, autoSpeak = true, lastReply = '';
const SY = window.speechSynthesis;
let voiceObj = null, voiceEN = null, audioUnlocked = false;

// ── Offline KB ────────────────────────────────────────────────────
const OFFL = [
  {k:['สวัสดี','หวัดดี','hello','hi'], r:()=>{const h=new Date().getHours();return(h<12?'อรุณสวัสดิ์ครับ':h<17?'สวัสดีตอนบ่ายครับ':h<21?'สวัสดีตอนเย็นครับ':'สวัสดีตอนดึกครับ')+'คุณเอ็ม ระบบยินดีต้อนรับครับ มีข้อมูลส่วนใดที่ต้องการให้ผมช่วยตรวจสอบไหมครับ';}},
  {k:['ชื่ออะไร','คุณคือ','เป็นใคร'], r:'ผมคือระบบไซเฟอร์ (CIPHER) ผู้ช่วยปัญญาประดิษฐ์ส่วนบุคคลของคุณเอ็มครับ'},
  {k:['กี่โมง','เวลา'], r:()=>{const t=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});return `ขณะนี้เวลา ${t} น. ครับ`;}},
  {k:['วันนี้','วันที่'], r:()=>{const d=new Date();const day=d.toLocaleDateString('th-TH',{weekday:'long',month:'long',day:'numeric'});const year=d.getFullYear();return `วันนี้ตรงกับ${day} พ.ศ. ${year} ครับ`;}},

function getOffline(t){
  const l=t.toLowerCase();
  for(const i of OFFL)if(i.k.some(k=>l.includes(k)))return typeof i.r==='function'?i.r():i.r;
  return NO_ANSWER[Math.floor(Math.random()*NO_ANSWER.length)];
}

// ── TTS ──────────────────────────────────────────────────────────
function unlockAudio(){
  if(audioUnlocked||!SY)return;
  const u=new SpeechSynthesisUtterance(' ');u.volume=0;u.rate=10;SY.speak(u);
  audioUnlocked=true;
}
function loadVoices(){
  if(!SY)return;
  const v=SY.getVoices();
  voiceObj=
    v.find(x=>/narisa/i.test(x.name))
    ||v.find(x=>/kanya/i.test(x.name))
    ||v.find(x=>/female|woman/i.test(x.name)&&x.lang==='th-TH')
    ||v.find(x=>x.lang==='th-TH'&&!/male|narong/i.test(x.name))
    ||v.find(x=>x.lang==='th-TH')
    ||v.find(x=>x.lang.startsWith('th'))
    ||null;
  voiceEN=
    v.find(x=>/samantha/i.test(x.name))
    ||v.find(x=>/karen/i.test(x.name))
    ||v.find(x=>/female|woman/i.test(x.name)&&x.lang.startsWith('en'))
    ||v.find(x=>x.lang==='en-AU')
    ||v.find(x=>x.lang==='en-GB'&&!/male/i.test(x.name))
    ||v.find(x=>x.lang==='en-US'&&!/male/i.test(x.name))
    ||v.find(x=>x.lang.startsWith('en'))
    ||null;
  console.log('TH voice:',voiceObj?.name,'| EN voice:',voiceEN?.name);
}
if(SY){loadVoices();SY.onvoiceschanged=loadVoices;setTimeout(loadVoices,600);}

function cleanText(t){
  return t.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27FF}]/gu,'')
    .replace(/[*_`#>~|]/g,'').replace(/https?:\/\/\S+/g,'').replace(/\s+/g,' ').trim();
}
function detectLang(t){const th=(t.match(/[\u0E00-\u0E7F]/g)||[]).length,en=(t.match(/[a-zA-Z]/g)||[]).length;return(th/(th+en+0.1))>=0.3?'th':'en';}

let keepAlive=null;
function startKA(){stopKA();keepAlive=setInterval(()=>{if(SY&&speaking){SY.pause();SY.resume();}},9000);}
function stopKA(){if(keepAlive){clearInterval(keepAlive);keepAlive=null;}}

function speak(text){
  if(!SY||!autoSpeak)return;
  unlockAudio();SY.cancel();
  setTimeout(()=>{
    const c=cleanText(text);if(!c)return;
    const parts=c.split(/(?<=[.!?ๆ])\s+|(?<=ครับ|แจ้งได้เลยครับ|ขอรับ)\s+/u).filter(s=>s.trim());
    const chunks=[];let buf='',bufLang='';
    for(const s of parts){const lang=detectLang(s);if(lang!==bufLang&&buf){chunks.push({t:buf.trim(),l:bufLang});buf='';}bufLang=lang;buf+=s+' ';}
    if(buf.trim())chunks.push({t:buf.trim(),l:bufLang||'th'});
    if(!chunks.length)return;
    let i=0;
    const nxt=()=>{
      if(i>=chunks.length){setSp(false);stopKA();return;}
      const ch=chunks[i++];const isEN=ch.l==='en';
      const u=new SpeechSynthesisUtterance(ch.t);
      u.voice=isEN?(voiceEN||voiceObj):voiceObj;u.lang=isEN?'en-GB':'th-TH';
      u.rate=isEN?1.1:1.15;u.pitch=1.05;u.volume=1;
      if(i===1)u.onstart=()=>{setSp(true);startKA();};
      u.onend=nxt;u.onerror=e=>{if(e.error==='interrupted'||e.error==='canceled'){setTimeout(nxt,50);return;}setSp(false);stopKA();};
      SY.speak(u);
    };nxt();
  },200);
}
function stopSpeak(){SY&&SY.cancel();setSp(false);stopKA();}
function setSp(v){speaking=v;document.getElementById('stop-btn').style.display=v?'flex':'none';setStat(v?'SPEAKING':listening?'LISTENING':'ONLINE',v?'var(--g1)':listening?'var(--red)':'');}
function replayLast(){if(lastReply){unlockAudio();speak(lastReply);}}

// ── Render ────────────────────────────────────────────────────────
function addMsg(role,content){
  const isU=role==='user';
  const d=document.createElement('div');d.className='msg'+(isU?' usr':'');
  const av=document.createElement('div');av.className='av '+(isU?'usr-av':'ai-av');av.textContent=isU?'YOU':'CI';
  const bd=document.createElement('div');bd.className='mb';
  const lb=document.createElement('div');lb.className='ml';
  const now=new Date();const ts=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  lb.textContent=isU?'[ YOU ]':'[ CIPHER ]';
  const tm=document.createElement('span');tm.className='msg-time';tm.textContent=ts;lb.appendChild(tm);
  const bb=document.createElement('div');bb.className='bub '+(isU?'usr-b':'ai-b');
  bb.title='แตะเพื่อคัดลอกข้อความ';
  bb.onclick=()=>copyBubble(content);
  const tx=document.createElement('span');bb.appendChild(tx);
  if(!isU)setTimeout(()=>typewriter(tx,content),50);else tx.textContent=content;
  bd.appendChild(lb);bd.appendChild(bb);
  if(!isU&&SY){const rb=document.createElement('button');rb.className='rbtn';rb.textContent='[ REPLAY ]';rb.onclick=()=>{unlockAudio();speak(content);};bd.appendChild(rb);}
  d.appendChild(av);d.appendChild(bd);
  document.getElementById('msgs').insertBefore(d,document.getElementById('loading'));
  setTimeout(()=>document.getElementById('loading').scrollIntoView({behavior:'smooth'}),50);
}
function setLoad(v){
  document.getElementById('loading').style.display=v?'flex':'none';
  if(v)setTimeout(()=>document.getElementById('loading').scrollIntoView({behavior:'smooth'}),50);
}
function typewriter(el,text,speed=16){
  el.textContent='';
  const cur=document.createElement('span');cur.className='type-cursor';el.appendChild(cur);
  let i=0;
  const t=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(t,text[i-1].match(/[ๆ.!?]/)?speed*3:speed);}else cur.remove();};t();
}

// ── Tavily Web Search ─────────────────────────────────────────────
async function searchTavily(query){
  if(!TAVILY_KEY)return '';
  try{
    updateDot('tavily',true);
    const r=await fetch(TAVILY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        api_key:TAVILY_KEY,
        query:query,
        search_depth:'advanced',
        max_results:5,
        include_answer:true
      })
    });
    updateDot('tavily',false);
    if(!r.ok)return '';
    const d=await r.json();
    let context = d.answer ? `[บทสรุปจากเว็บ]: ${d.answer}\n\n` : '';
    if(d&&d.results){
      context += d.results.map(x=>`Source: ${x.title}\nContent: ${x.content}`).join('\n\n');
    }
    return context;
  }catch(e){updateDot('tavily',false);console.error(e);}
  return '';
}

// ── Groq API ──────────────────────────────────────────────────────
async function callGroq(msgs){
  if(!GROQ_KEY)return 'กรุณาใส่ GROQ API KEY ก่อนนะครับ';
  try{
    updateDot('groq',true);
    const r=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        url:GROQ_URL,
        key:GROQ_KEY,
        payload:{
          model:'llama-3.3-70b-specdec',
          messages:msgs,
          temperature:0.3,
          max_tokens:1024
        }
      })
    });
    updateDot('groq',false);
    if(!r.ok){const ed=await r.json().catch(()=>({}));return `Error: ${r.status} ${ed.error?.message||''}`;}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'ระบบขัดข้องชั่วคราวครับ';
  }catch(e){updateDot('groq',false);console.error(e);return 'การเชื่อมต่อระบบขัดข้องครับ';}
}

function updateDot(id,on){const d=document.getElementById(id+'-dot');if(d)d.classList.toggle('off',!on);}

// ── Actions ───────────────────────────────────────────────────────
async function sendMsg(){
  const el=document.getElementById('msg-inp');const val=el.value.trim();if(!val)return;
  el.value='';resize();stopSpeak();
  addMsg('user',val);
  
  if(!window.navigator.onLine){
    setTimeout(()=>{const r=getOffline(val);addMsg('assistant',r);lastReply=r;speak(r);},400);
    return;
  }
  
  setLoad(true);
  let webContext='';
  const lower=val.toLowerCase();
  
  // ปรับเงื่อนไขการค้นหาเว็บให้ฉลาดขึ้น ครอบคลุมคีย์เวิร์ดคำถามทั่วไป
  const needWeb=/(เช็ค|ตรวจ|ราคา|ข่าว|สภาพอากาศ|พยากรณ์|หุ้น|crypto|btc|ทองคำ|วันนี้|ล่าสุด|อัปเดต|update|เว็บ|ค้นหา|ใคร|คืออะไร|ที่ไหน|เมื่อไหร่|ทำไม|สถิติ|แนวโน้ม|รีวิว|เที่ยว|สถานการณ์)/i.test(lower) || lower.includes('?');
  
  if(needWeb&&TAVILY_KEY)webContext=await searchTavily(val);
  
  const activeMsgs=[{role:'system',content:SYSTEM}];
  history.forEach(h=>activeMsgs.push(h));
  
  // บังคับ Prompt ให้ AI อ่านข้อมูลเว็บแล้วตอบให้เนียนขึ้น
  if(webContext){
    activeMsgs.push({
      role:'user',
      content:`[ข้อมูลอัปเดตล่าสุดจากการค้นหาเว็บ]\n${webContext}\n\nคำสั่ง/คำถามของคุณเอ็ม: ${val}\n\nข้อกำหนดการตอบ: โปรดใช้ข้อมูลอัปเดตด้านบนเพื่อตอบคำถามอย่างเป็นธรรมชาติและกระชับที่สุด หากข้อมูลข้างต้นไม่เพียงพอ ให้ใช้ความรู้เดิมของคุณอธิบายเสริมอย่างสุภาพ`
    });
  }else{
    activeMsgs.push({role:'user',content:val});
  }
  
  const reply=await callGroq(activeMsgs);
  setLoad(false);
  
  history.push({role:'user',content:val});
  history.push({role:'assistant',content:reply});
  if(history.length>16)history=history.slice(-16);
  localStorage.setItem('cipher_history_v2',JSON.stringify(history));
  
  addMsg('assistant',reply);
  lastReply=reply;
  speak(reply);
}

function resize(){const el=document.getElementById('msg-inp');el.style.height='auto';el.style.height=(el.scrollHeight)+'px';const btn=document.getElementById('send-ab');if(el.value.trim()){btn.classList.remove('dim');}else{btn.classList.add('dim');}}

document.getElementById('msg-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

function clearChat(){if(confirm('คุณต้องการลบประวัติการสนทนาทั้งหมดใช่หรือไม่ครับ?')){history=[];localStorage.removeItem('cipher_history_v2');document.querySelectorAll('.msg').forEach(m=>m.remove());stopSpeak();const h=new Date().getHours();const gt=h<12?'เช้านี้':h<17?'ตอนบ่าย':h<21?'ตอนเย็น':'ตอนดึก';const g=`ระบบดำเนินการล้างประวัติการสนทนาเสร็จสิ้นแล้วครับ สวัสดี${gt}ครับคุณเอ็ม มีสิ่งใดให้ผมช่วยเหลือเพิ่มเติมไหมครับ`;history.push({role:'assistant',content:g});addMsg('assistant',g);lastReply=g;speak(g);}}
function toggleVoice(){autoSpeak=!autoSpeak;if(!autoSpeak)stopSpeak();document.getElementById('vbtn').textContent=autoSpeak?'🔊':'🔇';document.getElementById('vbtn').classList.toggle('off',!autoSpeak);document.getElementById('ft-voice').textContent=autoSpeak?'VOICE ON':'VOICE OFF';}

function copyBubble(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(showToast).catch(()=>{});
  }else{
    const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast();}catch(e){}document.body.removeChild(ta);
  }
}
function showToast(){const d=document.createElement('div');d.className='copy-toast';d.textContent='[ COPIED TO CLIPBOARD ]';document.body.appendChild(d);setTimeout(()=>d.remove(),1500);}

const mArea=document.getElementById('msgs');
mArea.addEventListener('scroll',()=>{document.getElementById('scroll-top').style.display=mArea.scrollTop>200?'flex':'none';});
function scrollToTop(){mArea.scrollTo({top:0,behavior:'smooth'});}

function toggleTheme(){document.getElementById('theme-panel').classList.toggle('show');}
function setTheme(t){document.body.className='';if(t!=='green')document.body.classList.add('theme-'+t);document.getElementById('theme-panel').classList.remove('show');localStorage.setItem('cipher_theme',t);}
const savedTheme=localStorage.getItem('cipher_theme');if(savedTheme)setTheme(savedTheme);

const SIZES=[12,14,16,18];
function changeFontSize(){
  let curr=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))||14;
  let idx=SIZES.indexOf(curr);idx=(idx+1)%SIZES.length;const n=SIZES[idx];
  document.documentElement.style.setProperty('--fs',n+'px');
  document.getElementById('fs-label').textContent=n+'px';
  localStorage.setItem('cipher_fs',n);
}
const savedFs=localStorage.getItem('cipher_fs');if(savedFs){document.documentElement.style.setProperty('--fs',savedFs+'px');document.getElementById('fs-label').textContent=savedFs+'px';}

// ── Auth & Init ───────────────────────────────────────────────────
function saveKey(){
  const g=document.getElementById('api-inp').value.trim();
  const t=document.getElementById('tavily-inp').value.trim();
  if(!g){alert('กรุณากรอก GROQ API KEY เพื่อเปิดระบบการทำงานครับ');return;}
  GROQ_KEY=g;TAVILY_KEY=t;
  localStorage.setItem('cipher_groq',g);localStorage.setItem('cipher_tavily',t);
  startApp(true);
}
function clearKey(){if(confirm('คุณต้องการลบ API Keys ที่บันทึกไว้ในระบบออกทั้งหมดหรือไม่ครับ?')){localStorage.clear();location.reload();}}

function startApp(fromButton){
  document.getElementById('api-scr').style.display='none';
  document.getElementById('app').style.display='flex';
  
  const savedHist=localStorage.getItem('cipher_history_v2');
  if(savedHist){
    try{
      history=JSON.parse(savedHist);
      if(Array.isArray(history)&&history.length>0){
        history.forEach(m=>addMsg(m.role,m.content));
        const lastAsst=[...history].reverse().find(m=>m.role==='assistant');
        if(lastAsst)lastReply=lastAsst.content;
        setLoad(false);
        return;
      }
    }catch(e){history=[];}
  }
  
  const h=new Date().getHours();
  const gt=h<12?'เช้านี้':h<17?'ตอนบ่าย':h<21?'ตอนเย็น':'ตอนดึก';
  const g=`สวัสดี${gt}ครับคุณเอ็ม ระบบ CIPHER พร้อมให้บริการแล้วครับ มีสิ่งใดให้ผมช่วยเหลือหรือตรวจสอบข้อมูลในวันนี้ไหมครับ`;
  history.push({role:'assistant',content:g});addMsg('assistant',g);lastReply=g;
  if(fromButton){
    const try_speak=(n)=>{if(n>10)return;if(voiceObj&&SY)speak(g);else setTimeout(()=>try_speak(n+1),400);};
    setTimeout(()=>try_speak(0),400);
  }else{
    document.getElementById('tap-splash').style.display='flex';
  }
}

function onTap(){document.getElementById('tap-splash').style.display='none';unlockAudio();if(lastReply)speak(lastReply);}

if(GROQ_KEY)startApp(false);else document.getElementById('api-scr').style.display='flex';
</script>
